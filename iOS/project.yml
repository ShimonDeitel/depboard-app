name: Depboard
options:
  bundleIdPrefix: com.shimondeitel.depboard
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Depboard:
    type: application
    platform: iOS
    sources:
      - path: Depboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depboard
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Depboard/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  DepboardTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: DepboardTests
      - path: Depboard.storekit
    dependencies:
      - target: Depboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depboard.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  DepboardUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: DepboardUITests
    dependencies:
      - target: Depboard
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.depboard.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Depboard:
    build:
      targets:
        Depboard: all
        DepboardTests: [test]
        DepboardUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: Depboard.storekit
    test:
      config: Debug
      storeKitConfiguration: Depboard.storekit
      targets:
        - DepboardTests
        - DepboardUITests
    archive:
      config: Release
